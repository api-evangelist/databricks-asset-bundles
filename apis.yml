name: Databricks Asset Bundles
description: >-
  Databricks Asset Bundles (DABs) provide an infrastructure-as-code approach to
  managing Databricks data and AI projects. Bundles enable version control,
  CI/CD, deployment, and management of Databricks resources such as jobs,
  pipelines, apps, schemas, experiments, and model serving endpoints across
  workspaces using the Databricks CLI.
