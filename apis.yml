apis:
- name: Databricks Asset Bundles API
  description: >-
    The Databricks Asset Bundles API provides CLI-driven endpoints for
    initializing, validating, deploying, running, and destroying bundles of
    Databricks resources. Bundles define infrastructure and workspace settings
    such as deployment targets, resource configurations for jobs, pipelines,
    apps, and other assets, enabling programmatic lifecycle management of
    Databricks projects across development, staging, and production
    environments.
